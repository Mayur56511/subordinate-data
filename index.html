<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Subordinate Data</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    background: #1a1a2e;
  }
  .header .back-btn {
    background: none; border: none; color: #c0c0e0;
    font-size: 22px; cursor: pointer; margin-right: 12px;
  }
  .header h1 {
    flex: 1; text-align: center; font-size: 18px;
    font-weight: 600; color: #e0e0f0; margin-right: 34px;
  }

  /* Search Bar */
  .search-bar {
    margin: 8px 20px 12px;
    display: flex;
    background: #2a2a45;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #3a3a5c;
  }
  .search-bar input {
    flex: 1; padding: 12px 16px;
    background: transparent; border: none;
    color: #e0e0e0; font-size: 14px; outline: none;
  }
  .search-bar input::placeholder { color: #8080a0; }
  .search-bar button {
    background: #6c63ff; border: none; padding: 0 18px;
    cursor: pointer; display: flex; align-items: center;
    border-radius: 0 8px 8px 0;
  }
  .search-bar button svg { width: 20px; height: 20px; fill: white; }

  /* Filters */
  .filters {
    display: flex; gap: 12px;
    margin: 0 20px 16px; 
  }
  .filter-btn {
    flex: 1; padding: 10px 16px;
    background: #2a2a45; border: 1px solid #3a3a5c;
    border-radius: 10px; color: #c0c0e0;
    font-size: 14px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    appearance: none; -webkit-appearance: none;
  }
  .filter-btn option { background: #2a2a45; color: #c0c0e0; }

  /* Stats Card */
  .stats-card {
    margin: 0 20px 20px;
    background: linear-gradient(135deg, #7c6ff0, #a78bfa);
    border-radius: 16px;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .stat-item {
    padding: 12px 8px;
    text-align: center;
    position: relative;
  }
  .stat-item:nth-child(odd) {
    border-right: 1px solid rgba(255,255,255,0.2);
  }
  .stat-item:nth-child(1), .stat-item:nth-child(2) {
    border-bottom: 1px solid rgba(255,255,255,0.2);
  }
  .stat-item:nth-child(3), .stat-item:nth-child(4) {
    border-bottom: 1px solid rgba(255,255,255,0.2);
  }
  .stat-number {
    font-size: 28px; font-weight: 700; color: #fff;
  }
  .stat-label {
    font-size: 12px; color: rgba(255,255,255,0.75);
    margin-top: 4px;
  }

  /* User Cards */
  .user-list { padding: 0 20px 100px; }
  .user-card {
    background: #2a2a45;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 14px;
    border: 1px solid #3a3a5c;
  }
  .user-card-header {
    display: flex; align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid #3a3a5c;
  }
  .uid {
    font-size: 16px; font-weight: 600; color: #e0e0f0;
  }
  .copy-btn {
    background: none; border: none; cursor: pointer;
    margin-left: 10px; color: #8080a0; font-size: 16px;
  }
  .user-row {
    display: flex; justify-content: space-between;
    padding: 6px 0;
  }
  .user-row-label { color: #9090b0; font-size: 14px; }
  .user-row-value { color: #e0a050; font-size: 14px; font-weight: 500; }
  .user-row-value.neutral { color: #c0c0e0; }

  /* No Data */
  .no-data {
    text-align: center; padding: 40px 20px; color: #6060a0;
  }
  .no-data img { width: 120px; opacity: 0.5; margin-bottom: 16px; }

  /* Date Picker Modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 100; justify-content: center; align-items: flex-end;
  }
  .modal-overlay.active { display: flex; }
  .date-picker-modal {
    background: #1e1e3a;
    border-radius: 16px 16px 0 0;
    width: 100%; max-width: 480px;
    padding: 20px;
  }
  .date-picker-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .date-picker-header button {
    background: none; border: none; font-size: 16px; cursor: pointer;
  }
  .date-picker-header .cancel-btn { color: #9090b0; }
  .date-picker-header .confirm-btn { color: #7c6ff0; font-weight: 600; }
  .date-picker-header span { color: #e0e0f0; font-weight: 600; }
  
  .picker-columns {
    display: flex; gap: 10px; justify-content: center;
    height: 180px; overflow: hidden;
  }
  .picker-column {
    flex: 1; overflow-y: scroll; text-align: center;
    scroll-snap-type: y mandatory;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .picker-column::-webkit-scrollbar { display: none; }
  .picker-item {
    padding: 12px 0; font-size: 18px; color: #5050a0;
    scroll-snap-align: center; cursor: pointer;
    transition: all 0.2s;
  }
  .picker-item.selected { color: #e0e0f0; font-weight: 600; font-size: 20px; }

  /* Floating Chat Button */
  .chat-float {
    position: fixed; bottom: 24px; right: 24px;
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #7c6ff0, #a78bfa);
    border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(124,111,240,0.4);
  }
  .chat-float svg { width: 28px; height: 28px; fill: white; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <button class="back-btn" onclick="history.back()">‹</button>
  <h1>Subordinate data</h1>
</div>

<!-- Search -->
<div class="search-bar">
  <input type="text" placeholder="Search subordinate UID" id="searchInput">
  <button onclick="searchUID()">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
  </button>
</div>

<!-- Filters -->
<div class="filters">
  <select class="filter-btn" id="levelFilter" onchange="filterData()">
    <option value="all">All</option>
    <option value="1">Level 1</option>
    <option value="2">Level 2</option>
    <option value="3">Level 3</option>
    <option value="4">Level 4</option>
  </select>
  <select class="filter-btn" id="dateFilter" onchange="filterData()">
    <option value="2026-04-21">2026-04-21</option>
    <option value="2026-04-20">2026-04-20</option>
    <option value="2026-04-19">2026-04-19</option>
    <option value="2026-04-18">2026-04-18</option>
  </select>
</div>

<!-- Stats Card -->
<div class="stats-card">
  <div class="stat-item">
    <div class="stat-number" id="statDepositNum">1</div>
    <div class="stat-label">Deposit number</div>
  </div>
  <div class="stat-item">
    <div class="stat-number" id="statDepositAmt">1000</div>
    <div class="stat-label">Deposit amount</div>
  </div>
  <div class="stat-item">
    <div class="stat-number" id="statBettors">3</div>
    <div class="stat-label">Number of bettors</div>
  </div>
  <div class="stat-item">
    <div class="stat-number" id="statTotalBet">2188</div>
    <div class="stat-label">Total bet</div>
  </div>
  <div class="stat-item">
    <div class="stat-number" id="statFirstDepPpl">0</div>
    <div class="stat-label">Number of people making first deposit</div>
  </div>
  <div class="stat-item">
    <div class="stat-number" id="statFirstDepAmt">0</div>
    <div class="stat-label">First deposit amount</div>
  </div>
</div>

<!-- User Cards -->
<div class="user-list" id="userList"></div>

<!-- Floating Chat -->
<button class="chat-float">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/><path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
</button>

<script>
// Sample data
const users = [
  { uid: "443514", level: 1, deposit: 0, bet: 276, commission: 1.66, time: "2026-04-21" },
  { uid: "2390004", level: 3, deposit: 1000, bet: 1703, commission: 0.46, time: "2026-04-21" },
  { uid: "2321318", level: 2, deposit: 0, bet: 209, commission: 0.38, time: "2026-04-21" },
  { uid: "2324309", level: 4, deposit: 0, bet: 0, commission: 0, time: "2026-04-21" },
];

function renderUsers(data) {
  const list = document.getElementById('userList');
  if (data.length === 0) {
    list.innerHTML = '<div class="no-data"><p>No data</p></div>';
    return;
  }
  list.innerHTML = data.map(u => `
    <div class="user-card">
      <div class="user-card-header">
        <span class="uid">UID:${u.uid}</span>
        <button class="copy-btn" onclick="copyUID('${u.uid}')">📋</button>
      </div>
      <div class="user-row">
        <span class="user-row-label">Level</span>
        <span class="user-row-value neutral">${u.level}</span>
      </div>
      <div class="user-row">
        <span class="user-row-label">Deposit amount</span>
        <span class="user-row-value">${u.deposit}</span>
      </div>
      <div class="user-row">
        <span class="user-row-label">Bet amount</span>
        <span class="user-row-value">${u.bet}</span>
      </div>
      <div class="user-row">
        <span class="user-row-label">Commission</span>
        <span class="user-row-value">${u.commission}</span>
      </div>
      <div class="user-row">
        <span class="user-row-label">Time</span>
        <span class="user-row-value neutral" style="color:#6060a0">${u.time}</span>
      </div>
    </div>
  `).join('');
}

function filterData() {
  const level = document.getElementById('levelFilter').value;
  const date = document.getElementById('dateFilter').value;
  let filtered = users.filter(u => u.time === date);
  if (level !== 'all') filtered = filtered.filter(u => u.level == level);
  renderUsers(filtered);
}

function searchUID() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { filterData(); return; }
  const found = users.filter(u => u.uid.includes(q));
  renderUsers(found);
}

function copyUID(uid) {
  navigator.clipboard.writeText(uid).catch(() => {});
  alert('UID copied: ' + uid);
}

document.getElementById('searchInput').addEventListener('keyup', e => {
  if (e.key === 'Enter') searchUID();
});

// Init
renderUsers(users);
</script>
</body>
</html>
